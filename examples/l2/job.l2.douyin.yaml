# L2 Golden Sample — Douyin-fast preset (contract-safe)
#
# 只用已验证可生效的 YAML 键。
# 参见 examples/l2/README.md 的「关键限制」表。

duration: 60
format: "16:9"
narration_preset: douyin-fast
keep_cache: true
strict: false
no_clips: true

# bgm 路径请 CLI --bgm 传入；不要依赖 steps.bgm（不会启用 BGM）
# bgm: "D:/bgm/your-track.mp3"  # 或用 --bgm

steps:
  research: true       # 有效：经 research_enabled 通路
  translate: false     # 有效：短键唯一可靠别名
  # 以下短键在 WP1 前不生效（无 _STEP_ALIASES）：
  # scene, match, align, bgm, export

params:
  match_min_score: 0.25
  match_speed_clamp_min: 0.85
  match_speed_clamp_max: 1.25
  scene_merge_min_duration: 2.0
  match_drop_scene_min_duration: 0.4
  render_fit_mode: cover
  render_crf: 18
  render_preset: slow
  render_faststart: true
  render_subtitle_position: bottom
  qa_enabled: true
  bgm_normalize: true
  # 禁止写入 prompt_target_segment_duration（会 load 失败，靠 preset）
