# Movie Narrator 默认任务配置
# 所有字段可选 — 不填则使用 Settings / CLI 默认值
# CLI 参数优先级 > 本文件 > Settings 默认值

# --- 基础参数 ---
movie: "" # 电影名称（通常通过 CLI --movie 传入）
style: "" # 解说风格，如：热血搞笑 / 历史悬疑 / 温情催泪（通常 CLI 传入）
duration: 60 # 目标视频时长（秒）
voice: zh-CN-YunxiNeural # Edge-TTS 音色
format: "16:9" # 视频比例：16:9 或 9:16
keep_cache: false # 是否保留 TTS 缓存文件

# --- 路径（相对路径以本文件所在目录为基准解析）---
video: "" # 源电影文件路径（通常 CLI --video 传入）
library_dir: # 电影库目录，模糊匹配电影名
bgm: "" # 背景音乐文件路径

# --- 布尔开关 ---
no_bgm: false # 强制禁用 BGM（即使配置了 bgm 路径）
no_clips: false # 跳过场景片段导出
strict: false # 软步骤失败时中止流水线

# --- 软步骤开关（键名对应 PipelineStatus 字段）---
steps:
  research: true # LLM 电影剧情调研
  align: false # WhisperX 音频对齐（需 [ml] 额外依赖）
  scene: true # PySceneDetect 场景检测（需 [media] 额外依赖）
  match: true # 场景-脚本片段匹配
  bgm: false # 背景音乐混音（需配置 bgm 路径）
  export: false # 场景片段剪辑导出（需 [media] 额外依赖）

# --- 精细参数（白名单，其余参数不会被接受）---
params:
  scene_threshold: 27.0 # PySceneDetect 灵敏度，越高越不敏感（场景切分越少）
  scene_frame_skip: 10 # 场景检测跳帧数，每 N 帧处理 1 帧，越大越快但精度越低
  match_min_score: 0.25 # 场景匹配最低余弦相似度，低于此值不匹配
  research_provider: llm # 调研后端，目前仅支持 llm
