name: CI

on:
  push:
    branches: ["main", "feature/*", "hotfix/*"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

# Concurrency control: cancel in-progress runs for the same PR/branch
# when a new push arrives. This avoids wasted CI minutes when a PR is
# amended + force-pushed (e.g. PR #57 triggered 28 runs instead of 14).
#
# Group strategy:
# - PR: use pr-{number} so amend + force-push (same ref, new commit) cancels old runs
# - push to main/feature: use ref name (one active run per branch)
# - workflow_dispatch: use run_id (never cancels manual triggers)
#
# cancel-in-progress: true for all — main pushes are infrequent enough
# that cancelling a stale run on rapid successive merges is desirable.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test-matrix:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-noto-cjk

      - run: pip install -e ".[dev]"
      - name: Run unit tests
        run: pytest tests/ -v

      - name: Verify CLI entry points
        run: |
          mn --help
          mn version

      - name: Smoke test (full pipeline with mock)
        env:
          CI: 1
        run: |
          mn create --movie "CI-Test" --style "test" --duration 10 --keep-cache
          test -f output/CI-Test/script.md
          test -f output/CI-Test/final.mp4
          test -f output/CI-Test/subtitle.srt
          test -f output/CI-Test/metadata.json
          test -f output/CI-Test/narration.mp3
          echo "Smoke test passed"

      - name: Smoke test (YAML config)
        working-directory: examples
        env:
          CI: 1
        run: |
          mn create --config ci-test.yaml
          test -f output/CI-YAML-Test/script.md
          test -f output/CI-YAML-Test/final.mp4
          test -f output/CI-YAML-Test/metadata.json
          test -f output/CI-YAML-Test/subtitle.srt
          echo "YAML config smoke test passed"

  # Summary job — name "test" matches branch protection required check.
  # Matrix jobs generate "test-matrix (3.10)" etc. which don't match.
  # This job depends on all matrix jobs and is a no-op gate.
  test:
    needs: [test-matrix]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check matrix results
        run: |
          if [[ "${{ needs.test-matrix.result }}" == "success" ]]; then
            echo "All matrix jobs passed"
          else
            echo "Matrix jobs failed: ${{ needs.test-matrix.result }}"
            exit 1
          fi

  media:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-noto-cjk

      - name: Install with media extras
        run: pip install -e ".[media,dev]"

      - name: Run scene / match unit tests
        run: pytest tests/test_scenes.py tests/test_match.py tests/test_optional_deps.py -v

  webui:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: webui/package-lock.json

      - name: Install frontend dependencies
        working-directory: webui
        run: npm ci

      - name: Type-check and build frontend
        working-directory: webui
        run: npm run build

      - name: Verify build output
        run: |
          test -f src/movie_narrator/web_api/static/index.html
          test -n "$(ls src/movie_narrator/web_api/static/assets/*.js)"
          test -n "$(ls src/movie_narrator/web_api/static/assets/*.css)"
          echo "Frontend build verified"
