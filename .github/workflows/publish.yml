name: Publish to PyPI

on:
  push:
    tags: ["v*"]

permissions:
  id-token: write   # OIDC for trusted publishing to PyPI
  contents: write   # needed to create GitHub Release

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build twine

      - name: Build package
        run: python -m build

      - name: Check distribution
        run: twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Generate release notes from CHANGELOG
        id: notes
        run: |
          TAG_VERSION="${{ steps.version.outputs.version }}"
          python3 -c "
          import re, sys
          with open('CHANGELOG.md') as f:
              content = f.read()
          pattern = r'## \[' + re.escape('${TAG_VERSION}') + r'\](.*?)(?=\n## \[|\Z)'
          m = re.search(pattern, content, re.DOTALL)
          if m:
              # Strip the header line, keep only section content
              lines = m.group(1).strip().split('\n', 1)
              body = lines[1] if len(lines) > 1 else lines[0]
              with open('/tmp/release_notes.md', 'w') as out:
                  out.write(body.strip() + '\n')
          else:
              with open('/tmp/release_notes.md', 'w') as out:
                  out.write('Release ${TAG_VERSION}\n')
          "

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: /tmp/release_notes.md
          draft: false
          prerelease: false
